<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Test API Kasbon by Nama</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f4f4f4; }
      .container { max-width: 400px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px #0001; padding: 24px; }
      input, button { width: 100%; margin-bottom: 14px; padding: 8px; font-size: 1em; border-radius: 4px; border: 1px solid #ddd; }
      button { background: #0796f7; color: #fff; border: none; font-weight: bold; cursor: pointer; }
      .result { white-space: pre-wrap; font-size: 1em; margin-top: 16px; padding: 10px; border-radius: 6px; }
      .error { background: #ffe0e0; color: #c00; border: 1px solid #c00; }
      .success { background: #e8ffe8; color: #075c0c; border: 1px solid #11ad3e; }
    </style>
</head>
<body>
  <div class="container">
    <h2>Test API Kasbon (Input Nama Karyawan)</h2>
    <form id="kasbonForm">
      <input type="text" id="nama" placeholder="Nama Karyawan" required>
      <input type="date" id="tanggal" required>
      <input type="number" id="jumlah" placeholder="Jumlah" value="100000" required>
      <input type="text" id="keperluan" placeholder="Keperluan" value="Pembelian material" required>
      <button type="submit">Kirim</button>
    </form>
    <div id="result"></div>
  </div>
  <script>
    document.getElementById('tanggal').value = (new Date()).toISOString().slice(0,10);
    document.getElementById('kasbonForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const resultDiv = document.getElementById('result');
      resultDiv.textContent = 'Memproses...';
      const data = {
        nama: document.getElementById('nama').value,
        tanggal: document.getElementById('tanggal').value,
        jumlah: parseInt(document.getElementById('jumlah').value),
        keperluan: document.getElementById('keperluan').value
      };
      try {
        const response = await fetch('https://datarealsolution.net/api/form_kasbon.php', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(data)
        });
        const json = await response.json();
        if (json.status === 'success') {
          resultDiv.className = "result success";
          resultDiv.textContent = '✅ ' + json.message;
        } else {
          resultDiv.className = "result error";
          resultDiv.textContent = '❌ ' + json.message;
        }
      } catch (error) {
        resultDiv.className = "result error";
        resultDiv.textContent = "Gagal terhubung ke server: " + error.message;
      }
    });
  </script>
</body>
</html>
